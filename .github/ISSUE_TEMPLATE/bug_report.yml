name: Bug report
description: Report a reproducible problem in the public site or admin area.
title: "[Bug]: "
labels:
  - bug
body:
  - type: input
    id: page
    attributes:
      label: Page or area
      placeholder: /kontakti, admin tickets, registration form
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open ...
        2. Click ...
        3. See error ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual result
    validations:
      required: true
  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Local
        - Staging
        - Production
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Screenshots or logs
      placeholder: Paste screenshots, console errors, or stack traces here.
